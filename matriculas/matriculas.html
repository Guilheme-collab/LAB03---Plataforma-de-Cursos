<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Matrículas</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Matrícula em Cursos</h3>

        <form id="formMatricula" class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Usuário</label>
                <select id="usuario" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Curso</label>
                <select id="curso" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Data Matrícula</label>
                <input type="date" id="data" class="form-control" readonly>
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Matricular
                </button>
            </div>

        </form>

        <hr>

        <h4>Lista de Matrículas</h4>

        <div class="table-responsive">
            <table class="table table-striped">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Usuário</th>
                        <th>Curso</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaMatriculas"></tbody>

            </table>
        </div>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="matriculas.js"></script>

</body>

</html>
