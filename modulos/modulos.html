<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Módulos</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Cadastro de Módulos</h3>

        <form id="formModulo" class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Curso</label>
                <select id="curso" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Ordem</label>
                <input type="number" id="ordem" class="form-control">
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Cadastrar
                </button>
            </div>

        </form>

        <hr>

        <h4>Lista de Módulos</h4>

        <div class="table-responsive">
            <table class="table table-striped">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Curso</th>
                        <th>Título</th>
                        <th>Ordem</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaModulos"></tbody>

            </table>
        </div>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="modulos.js"></script>

</body>

</html>
