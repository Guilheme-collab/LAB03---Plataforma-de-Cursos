<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Aulas</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Cadastro de Aulas</h3>

        <form id="formAula" class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Módulo</label>
                <select id="modulo" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Tipo Conteúdo</label>
                <select id="tipo" class="form-select">
                    <option>Vídeo</option>
                    <option>Texto</option>
                    <option>Quiz</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">URL Conteúdo</label>
                <input type="text" id="url" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Duração (min)</label>
                <input type="number" id="duracao" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Ordem</label>
                <input type="number" id="ordem" class="form-control">
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Cadastrar
                </button>
            </div>

        </form>

        <hr>

        <h4>Lista de Aulas</h4>

        <div class="table-responsive">
            <table class="table table-striped">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Módulo</th>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Duração</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaAulas"></tbody>

            </table>
        </div>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="aulas.js"></script>

</body>

</html>
