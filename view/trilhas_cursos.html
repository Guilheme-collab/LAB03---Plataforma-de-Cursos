<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Trilhas × Cursos — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-1">Cursos da Trilha</h3>
        <p class="text-muted mb-4">Vincule cursos às trilhas de conhecimento e defina sua ordem de exibição.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">Vincular Curso a Trilha</div>
            <div class="card-body">
                <form id="formTrilhaCurso" class="row g-3" onsubmit="salvarTrilhaCurso(this); return false;">
                    <div class="col-md-5">
                        <label class="form-label">Trilha</label>
                        <select id="trilha" name="trilha" class="form-select" required></select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Curso</label>
                        <select id="curso" name="curso" class="form-select" required></select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Ordem na Trilha</label>
                        <input type="number" min="1" id="ordem" name="ordem" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-secondary">Vincular</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Vínculos Registrados</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th><th>Trilha</th><th>Curso</th><th>Ordem</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaTrilhaCursos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
