<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Usuários — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="mb-1">Usuários</h3>
        <p class="text-muted mb-4">Cadastre alunos e instrutores da plataforma.</p>

        <div class="card card-body shadow-sm mb-4">
            <div class="row mb-2">
                <div class="col"><h5 class="mb-0">Formulário de Cadastro</h5></div>
            </div>
            <form id="formUsuario" class="row g-3" onsubmit="salvarUsuario(this); return false;">
                <div class="col-md-4">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="nome" name="nome" class="form-control" placeholder="Nome completo" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="email@exemplo.com" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Digite uma nova senha">
                        <button class="btn btn-outline-secondary" type="button" id="toggleSenha" onclick="toggleVisibilidadeSenha()">Ver</button>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data Cadastro</label>
                    <input type="date" id="dataCadastro" name="dataCadastro" class="form-control" readonly>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="reset" class="btn btn-outline-secondary" onclick="delete this.form.dataset.editId; this.form.querySelector('[type=submit]').textContent='Salvar'; document.getElementById('dataCadastro').value = new Date().toISOString().split('T')[0]; if(document.getElementById('senha')){ document.getElementById('senha').type='password'; document.getElementById('toggleSenha').textContent='Ver'; }">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Lista de Usuários</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Data Cadastro</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaUsuarios"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
    <script>
        // Auto-fill data cadastro on load (antes do módulo carregar)
        document.getElementById('dataCadastro').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
