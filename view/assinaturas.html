<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Assinaturas — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="mb-1">Assinaturas</h3>
        <p class="text-muted mb-4">Vincule usuários a planos e gerencie datas automáticas.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">Nova Assinatura</div>
            <div class="card-body">
                <form id="formAssinatura" class="row g-3" onsubmit="salvarAssinatura(this); return false;">
                    <div class="col-md-3">
                        <label class="form-label">Usuário</label>
                        <select id="usuario" name="usuario" class="form-select" required></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Plano</label>
                        <select id="plano" name="plano" class="form-select" required></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Data Início</label>
                        <input type="date" id="inicio" name="inicio" class="form-control" readonly>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Data Fim <small class="text-muted">(calculado pelo plano)</small></label>
                        <input type="date" id="fim" name="fim" class="form-control" readonly>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Assinar</button>
                        <button type="reset" class="btn btn-outline-secondary" onclick="delete this.form.dataset.editId; this.form.querySelector('[type=submit]').textContent='Assinar';">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Lista de Assinaturas</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Usuário</th><th>Plano</th><th>Início</th><th>Fim</th><th>Status</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaAssinaturas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
