<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Matrículas — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-1">Matrículas</h3>
        <p class="text-muted mb-4">Gerencie inscrições de alunos em cursos.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white">Nova Matrícula</div>
            <div class="card-body">
                <form id="formMatricula" class="row g-3" onsubmit="salvarMatricula(this); return false;">
                    <div class="col-md-4">
                        <label class="form-label">Usuário</label>
                        <select id="usuario" name="usuario" class="form-select" required></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Curso</label>
                        <select id="curso" name="curso" class="form-select" required></select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data Matrícula</label>
                        <input type="date" id="data" name="data" class="form-control" readonly>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data Conclusão <small class="text-muted">(opcional)</small></label>
                        <input type="date" id="conclusao" name="conclusao" class="form-control">
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Matricular</button>
                        <button type="reset" class="btn btn-outline-secondary" onclick="delete this.form.dataset.editId; this.form.querySelector('[type=submit]').textContent='Matricular';">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Lista de Matrículas</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Usuário</th><th>Curso</th><th>Data Matrícula</th><th>Data Conclusão</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaMatriculas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
