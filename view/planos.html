<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Planos — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-1">Planos de Assinatura</h3>
        <p class="text-muted mb-4">Configure os planos disponíveis na plataforma.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-warning text-dark">Cadastro de Plano</div>
            <div class="card-body">
                <form id="formPlano" class="row g-3" onsubmit="salvarPlano(this); return false;">
                    <div class="col-md-6">
                        <label class="form-label">Nome do Plano</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" step="0.01" min="0" id="preco" name="preco" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Duração (Meses)</label>
                        <input type="number" min="1" id="duracao" name="duracao" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea id="descricao" name="descricao" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark">Cadastrar</button>
                        <button type="reset" class="btn btn-outline-secondary" onclick="delete this.form.dataset.editId; this.form.querySelector('[type=submit]').textContent='Cadastrar';">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Planos Cadastrados</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Duração</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaPlanos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
