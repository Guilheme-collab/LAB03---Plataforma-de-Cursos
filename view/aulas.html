<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Aulas — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-1">Aulas</h3>
        <p class="text-muted mb-4">Adicione aulas aos módulos e defina sua sequência.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">Cadastro de Aula</div>
            <div class="card-body">
                <form id="formAula" class="row g-3" onsubmit="salvarAula(this); return false;">
                    <div class="col-md-4">
                        <label class="form-label">Módulo</label>
                        <select id="modulo" name="modulo" class="form-select" required></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Título da Aula</label>
                        <input type="text" id="titulo" name="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de Conteúdo</label>
                        <select id="tipo" name="tipo" class="form-select">
                            <option>Vídeo</option>
                            <option>Texto</option>
                            <option>Quiz</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">URL do Conteúdo</label>
                        <input type="text" id="url" name="url" class="form-control" placeholder="https://...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Duração (min)</label>
                        <input type="number" min="1" id="duracao" name="duracao" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ordem no Módulo</label>
                        <input type="number" min="1" id="ordem" name="ordem" class="form-control" required>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-success">Cadastrar</button>
                        <button type="reset" class="btn btn-outline-secondary" onclick="delete this.form.dataset.editId; this.form.querySelector('[type=submit]').textContent='Cadastrar';">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Lista de Aulas</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Módulo</th><th>Título</th><th>Tipo</th><th>Duração</th><th>Ordem</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaAulas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
