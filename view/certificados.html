<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Certificados — Plataforma de Cursos</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">⬅ Plataforma Cursos</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-1">Certificados</h3>
        <p class="text-muted mb-4">Emita certificados de conclusão de cursos ou trilhas. O código é gerado automaticamente.</p>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">Emitir Certificado</div>
            <div class="card-body">
                <form id="formCertificado" class="row g-3" onsubmit="salvarCertificado(this); return false;">
                    <div class="col-md-3">
                        <label class="form-label">Usuário</label>
                        <select id="usuario" name="usuario" class="form-select" required></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Curso</label>
                        <select id="curso" name="curso" class="form-select" required></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trilha <small class="text-muted">(opcional)</small></label>
                        <select id="trilha" name="trilha" class="form-select"></select>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label">Código</label>
                        <input type="text" id="codigo" name="codigo" class="form-control" readonly>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data Emissão</label>
                        <input type="date" id="data" name="data" class="form-control" readonly>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Emitir Certificado</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Certificados Emitidos</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Usuário</th><th>Curso</th><th>Trilha</th><th>Código</th><th>Data Emissão</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCertificados"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../main.mjs"></script>
</body>
</html>
