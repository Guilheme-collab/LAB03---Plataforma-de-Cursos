<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Avaliações</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Avaliações dos Cursos</h3>

        <form id="formAvaliacao" class="row g-3">

            <div class="col-md-4">
                <label>Usuário</label>
                <select id="usuario" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label>Curso</label>
                <select id="curso" class="form-select"></select>
            </div>

            <div class="col-md-2">
                <label>Nota</label>
                <select id="nota" class="form-select">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </div>

            <div class="col-md-2">
                <label>Data</label>
                <input type="date" id="data" class="form-control" readonly>
            </div>

            <div class="col-12">
                <label>Comentário</label>
                <textarea id="comentario" class="form-control"></textarea>
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Avaliar
                </button>
            </div>

        </form>

        <hr>

        <table class="table table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Usuário</th>
                    <th>Curso</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaAvaliacoes"></tbody>

        </table>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="avaliacoes.js"></script>

</body>

</html>
