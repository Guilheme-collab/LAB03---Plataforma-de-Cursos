<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Trilhas Cursos</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Cursos da Trilha</h3>

        <form id="formTrilhaCurso" class="row g-3">

            <div class="col-md-4">
                <label>Trilha</label>
                <select id="trilha" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label>Curso</label>
                <select id="curso" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label>Ordem</label>
                <input type="number" id="ordem" class="form-control">
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Adicionar
                </button>
            </div>

        </form>

        <hr>

        <table class="table table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Trilha</th>
                    <th>Curso</th>
                    <th>Ordem</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaTrilhaCursos"></tbody>

        </table>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="trilhas_cursos.js"></script>

</body>

</html>
