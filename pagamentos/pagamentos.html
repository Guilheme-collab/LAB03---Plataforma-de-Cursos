<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <title>Pagamentos</title>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                Plataforma Cursos
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3>Pagamentos</h3>

        <form id="formPagamento" class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Assinatura</label>
                <select id="assinatura" class="form-select"></select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Valor</label>
                <input type="number" id="valor" class="form-control" readonly required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data Pagamento</label>
                <input type="date" id="data" class="form-control" readonly>
            </div>

            <div class="col-md-3">
                <label class="form-label">Método</label>
                <select id="metodo" class="form-select">
                    <option>Cartão</option>
                    <option>PIX</option>
                    <option>Boleto</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">ID Transação</label>
                <input type="text" id="transacao" class="form-control" readonly>
            </div>

            <div class="col-12">
                <button class="btn btn-primary">
                    Registrar Pagamento
                </button>
            </div>

        </form>

        <hr>

        <table class="table table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Assinatura</th>
                    <th>Valor</th>
                    <th>Método</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaPagamentos"></tbody>

        </table>

    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="pagamentos.js"></script>

</body>

</html>
